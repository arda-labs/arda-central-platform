databaseChangeLog:
  - changeSet:
      id: 07-seed-master-tenant
      author: arda-central
      preConditions:
        - onFail: MARK_RAN
          not:
            sqlCheck:
              expectedResult: 1
              sql: "SELECT COUNT(*) FROM tenants WHERE tenant_key = 'master'"
      changes:
        - insert:
            tableName: tenants
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: tenant_key
                  value: master
              - column:
                  name: display_name
                  value: Arda System Admin
              - column:
                  name: status
                  value: ACTIVE
              - column:
                  name: db_type
                  value: POSTGRES
              - column:
                  name: jdbc_url
                  value: jdbc:postgresql://localhost:5432/arda_iam
              - column:
                  name: db_username
                  value: postgres
              - column:
                  name: db_password
                  value: password
              - column:
                  name: driver_class_name
                  value: org.postgresql.Driver
              - column:
                  name: primary_color
                  value: "#6366F1"
