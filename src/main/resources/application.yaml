server:
  port: 8000

spring:
  application:
    name: arda-central-platform

  # Disable default Spring Boot Security auto-configuration
  # We use custom security config from arda-shared-kernel
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  # Central Platform Database (Static Configuration)
  datasource:
    url: jdbc:postgresql://localhost:5432/arda_central
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # Liquibase for database migrations
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Initialize Database with Schema and Seed Data
  # DISABLED: Requires PostgreSQL to be running
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: false

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Disable multi-tenancy for Central Platform
# Central Platform manages tenant metadata, it doesn't route to tenant databases
arda:
  shared:
    multi-tenancy:
      enabled: false
    security:
      enabled: true
      jwt:
        base-keycloak-url: http://localhost:8081
        issuer-uri: http://localhost:8081/realms/master
      cors:
        allowed-origins:
          - http://localhost:3000
        allowed-methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        allowed-headers:
          - "*"
        max-age: 3600
    # V2: Gateway AuthN — APISIX verifies Keycloak JWT and signs Internal JWT
    # Services verify X-Internal-Token header instead of Keycloak JWT directly
    internal-jwt:
      enabled: true
      public-key-location: classpath:internal-jwt-public.pem
      issuer: arda-gateway

logging:
  level:
    vn.io.arda: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
